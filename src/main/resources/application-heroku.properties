# ============================================================
# mcg-file-preprocessor-app — Heroku Production Profile
# Target: private-L one-off dyno (1 GB RAM, -Xmx700m)
# ============================================================
spring.config.activate.on-profile=heroku

spring.application.name=mcg-file-preprocessor-app

# Filenames & short_url transaction_* / creation_date — Mexico City wall time (override: PREPROCESSOR_TIME_ZONE).
# preprocessor.time-zone inherited from application.properties default America/Mexico_City

server.port=${SERVER_PORT:8080}

# Heroku Postgres — DataSourceConfig parses DATABASE_URL

# ============================================================
# Connection pool — tuned for a one-off batch dyno.
# Set DB_POOL_MAX >= SHORTURL_PARALLEL_BATCHES (default 4) for parallel ShortUrl.
# ============================================================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:8}

# ============================================================
# SFTP — all connection details from environment variables
# ============================================================
sftp.mode=remote

# Telmex SFTP Configuration
sftp.preprocessor.telmex.host=${SFTP_TELMEX_HOST}
sftp.preprocessor.telmex.port=${SFTP_TELMEX_PORT:22}
sftp.preprocessor.telmex.username=${SFTP_TELMEX_USERNAME}
sftp.preprocessor.telmex.password=${SFTP_TELMEX_PASSWORD}
sftp.preprocessor.telmex.private-key=${SFTP_TELMEX_PRIVATE_KEY:}
sftp.preprocessor.telmex.passphrase=${SFTP_TELMEX_PASSPHRASE:}
sftp.preprocessor.telmex.known-hosts=${SFTP_TELMEX_KNOWN_HOSTS:}
sftp.preprocessor.telmex.allow-unknown-keys=${SFTP_TELMEX_ALLOW_UNKNOWN_KEYS:true}
sftp.preprocessor.telmex.input-dir=${SFTP_TELMEX_INPUT_DIR:/}
# Output dir must match MC File Drop import path (enriched files are .txt). Default /processed.
# If MC doesn't detect files, set PREPROCESSOR_OUTPUT_TIMESTAMP_SUFFIX=true (new filename per run).
sftp.preprocessor.telmex.output-dir=${SFTP_TELMEX_OUTPUT_DIR:/ready_files}
# Glob for basenames; only .zip / .txt are listed/processed.
sftp.preprocessor.telmex.file-pattern=${SFTP_TELMEX_FILE_PATTERN:*_S_*}

# Telnor SFTP Configuration
sftp.preprocessor.telnor.host=${SFTP_TELNOR_HOST}
sftp.preprocessor.telnor.port=${SFTP_TELNOR_PORT:22}
sftp.preprocessor.telnor.username=${SFTP_TELNOR_USERNAME}
sftp.preprocessor.telnor.password=${SFTP_TELNOR_PASSWORD}
sftp.preprocessor.telnor.private-key=${SFTP_TELNOR_PRIVATE_KEY:}
sftp.preprocessor.telnor.passphrase=${SFTP_TELNOR_PASSPHRASE:}
sftp.preprocessor.telnor.known-hosts=${SFTP_TELNOR_KNOWN_HOSTS:}
sftp.preprocessor.telnor.allow-unknown-keys=${SFTP_TELNOR_ALLOW_UNKNOWN_KEYS:true}
sftp.preprocessor.telnor.input-dir=${SFTP_TELNOR_INPUT_DIR:/}
# Output dir must MC File Drop import path (enriched files are .txt). Default /processed.
# If MC doesn't de files, set PREPROCESSOR_OUTPUT_TIMESTAMP_SUFFIX=true (new filename per run).
sftp.preprocessor.telnor.output-dir=${SFTP_TELNOR_OUTPUT_DIR:/ready_files}
# Glob for basenam only .zip / .txt are listed/processed.
sftp.preprocessor.telnor.file-pattern=${SFTP_TELNOR_FILE_PATTERN:*_S_*}

# Gateway callback — when set, preprocessor calls POST /api/preprocessor/next on success
preprocessor.gateway.url=${MCG_GATEWAY_URL:}
preprocessor.callback.secret=${PREPROCESSOR_CALLBACK_SECRET:}

# ============================================================
# Short URL — direct DB mode (default on Heroku)
# Set SHORTURL_MODE=http to call mcg-short-url-app instead.
# ============================================================
shorturl.mode=${SHORTURL_MODE:direct}
shorturl.base-domain=${SHORTURL_BASE_DOMAIN}
shorturl.max-attempts=${SHORTURL_MAX_ATTEMPTS:3}

# Only needed when SHORTURL_MODE=http
shorturl.base-url=${SHORT_URL_BASE_URL:}
shorturl.connect-timeout-ms=${SHORTURL_CONNECT_TIMEOUT_MS:3000}
shorturl.read-timeout-ms=${SHORTURL_READ_TIMEOUT_MS:5000}

# ============================================================
# Chunk size — 20 000 rows ≈ 4 MB per chunk on private-L (1 GB / -Xmx700m).
# Each dyno processes one file; raise to 50 000 on private-XL (2.5 GB).
# ============================================================
preprocessor.chunk-size=${PREPROCESSOR_CHUNK_SIZE:2000}

# One file per dyno — use separate one-off dynos for parallel files.
preprocessor.concurrency=1

# MC file drop: when true, append _yyyyMMdd_HHmm to output so MC sees a new file.
# Enable if MC doesn't detect renamed files (rename may not trigger file drop).
preprocessor.output.timestamp-suffix=${PREPROCESSOR_OUTPUT_TIMESTAMP_SUFFIX:false}

# Private-L one-off: full output is written to disk first, then streamed once to the final SFTP filename (no temp*.txt on SFTP).
# Requires ephemeral disk ≥ output size (see Heroku dyno limits). Set PREPROCESSOR_STAGE_OUTPUT_TO_DISK=false to use pipe mode.
preprocessor.output.stage-to-disk-before-upload=${PREPROCESSOR_STAGE_OUTPUT_TO_DISK:true}
preprocessor.output.staging-dir=${PREPROCESSOR_STAGING_DIR:}

# Only used in pipe mode (stage-to-disk=false): after remote temp*.txt, copy→final vs rename. Ignored when staging uploads direct-to-final.
preprocessor.output.copy-instead-of-rename=${PREPROCESSOR_OUTPUT_COPY_INSTEAD_OF_RENAME:true}

logging.level.root=INFO
logging.level.com.salesforce.mcg.preprocessor=INFO
