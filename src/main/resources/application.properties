# ============================================================
# mcg-file-preprocessor-app — Base Configuration
# ============================================================

spring.datasource.url=
spring.sql.init.mode=never
spring.main.allow-bean-definition-overriding=true

# Disable batch auto-configuration (no Spring Batch in this module)
spring.batch.job.enabled=false

# ============================================================
# Short Code defaults (overridable via env vars)
# ============================================================
shortcode.telcel=${TELCEL_SHORT_CODE:89992}
shortcode.non-telcel.1=${NON_TELCEL_SHORT_CODE_1:35000}
shortcode.non-telcel.2=${NON_TELCEL_SHORT_CODE_2:90120}

# ============================================================
# Telcel operator codes (comma-separated)
# ============================================================
telcel.operator.codes=${TELCEL_OPERATOR_CODES:006,330,188}
gateway.sms.force-non-telcel=${FORCE_NON_TELCEL_SUBSCRIBER:false}

# ============================================================
# Short URL mode
#   direct (default) — write to shorturl_sch.short_url via JDBC on the same DB
#   http             — call mcg-short-url-app POST /api/shorturl/batch
# ============================================================
shorturl.mode=${SHORTURL_MODE:direct}
shorturl.base-domain=${SHORTURL_BASE_DOMAIN:}
shorturl.max-attempts=${SHORTURL_MAX_ATTEMPTS:3}
# COPY bulk load (default true). When false, use batched INSERT.
shorturl.use-copy=${SHORTURL_USE_COPY:true}
# INSERT sub-batch size (10k default); used when use-copy=false.
shorturl.insert-batch-size=${SHORTURL_INSERT_BATCH_SIZE:10000}
# Rows per INSERT...SELECT when using COPY; smaller can reduce lock contention.
shorturl.copy-insert-batch-size=${SHORTURL_COPY_INSERT_BATCH_SIZE:10000}
# Split ShortUrl into N parallel DB batches (default 4 for ~4x speedup). Requires DB_POOL_MAX >= N.
shorturl.parallel-batches=${SHORTURL_PARALLEL_BATCHES:4}

# Only used when shorturl.mode=http
shorturl.base-url=${SHORT_URL_BASE_URL:}
shorturl.batch-endpoint=/api/shorturl/batch
shorturl.connect-timeout-ms=${SHORTURL_CONNECT_TIMEOUT_MS:3000}
shorturl.read-timeout-ms=${SHORTURL_READ_TIMEOUT_MS:5000}

# Enable default protocol when massive url do not have http/https as part of the url
shorturl.enable-default-http-protocol-when-missing=true

# false = save url with no protocol with default http
# true = save url with no protocol with secure https
shorturl.use-secure-http-protocol-by-default=true

# ============================================================
# Input file format
# Delimiter: pipe (|) per MC automation spec.
# Phone column: CELULAR  |  URL columns: URL, URL2
# Column order is resolved dynamically from the header row.
# ============================================================
preprocessor.output.include-header=true

# When true, write enriched output to a local temp file first, then upload that file to SFTP/ready_files.
# Upload still streams from disk (no whole-file heap buffer). Needs disk space ~ output size (use /tmp or PREPROCESSOR_STAGING_DIR).
# Heroku profile defaults this true so MC never sees the final SFTP name until the local file is fully written.
preprocessor.output.stage-to-disk-before-upload=${PREPROCESSOR_STAGE_OUTPUT_TO_DISK:false}
# Optional; empty = java.io.tmpdir (typically /tmp)
preprocessor.output.staging-dir=${PREPROCESSOR_STAGING_DIR:}

# Pipe mode only: after upload to remote temp*.txt, copy to final and delete temp (true) vs server rename (false).
# With stage-to-disk-before-upload=true, output streams once to the final name (no remote temp). Env: PREPROCESSOR_OUTPUT_COPY_INSTEAD_OF_RENAME
preprocessor.output.copy-instead-of-rename=${PREPROCESSOR_OUTPUT_COPY_INSTEAD_OF_RENAME:false}

# ============================================================
# Chunk size — rows processed in memory at once.
# Tuned for private-L dynos (1 GB RAM, -Xmx700m):
#   20 000 rows × ~200 bytes/row ≈ 4 MB per chunk — well within budget.
#   Raise to 50 000 on private-XL (2.5 GB) for fewer DB round-trips.
# ============================================================
preprocessor.chunk-size=${PREPROCESSOR_CHUNK_SIZE:2000}

# ============================================================
# Parallel file processing within a single dyno
# Private-L has 1 vCPU allocated. Running a second file in-process would
# compete for the same CPU and DB connections without meaningful gain.
# Use separate one-off dynos (each with --file=<name>) for true parallelism.
# ============================================================
preprocessor.concurrency=${PREPROCESSOR_CONCURRENCY:1}

# ============================================================
# Dyno lifecycle
# ============================================================
app.auto-shutdown=${APP_AUTO_SHUTDOWN:true}

# Wall-clock for filenames, short_url transaction_* fields, creation_date (not UTC).
preprocessor.time-zone=${PREPROCESSOR_TIME_ZONE:America/Mexico_City}

logging.level.root=INFO
logging.level.com.salesforce.mcg.preprocessor=INFO